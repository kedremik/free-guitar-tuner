name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & bundle
    runs-on: ubuntu-latest
    env:
      # Keep Expo non-interactive and quiet in CI.
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Metro-bundle every platform. The native export runs on Linux (JS only,
      # no Xcode) and is the only check that catches NativeWind/lightningcss
      # native bundling regressions, which the web pipeline hides.
      - name: Export web bundle
        run: pnpm exec expo export --platform web --output-dir dist-web

      - name: Export native bundle
        run: pnpm exec expo export --platform ios --output-dir dist-ios
